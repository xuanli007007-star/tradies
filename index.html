<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨尔本装修招标平台 - Tradie Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">
    <nav class="bg-blue-700 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-hammer text-orange-400 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-tight">MelbMarketing <span class="font-light text-sm opacity-80 uppercase">Tradie Hub</span></h1>
            </div>
            <button class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg font-bold text-sm transition">师傅入驻</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-slate-800">墨尔本最新装修招标</h2>
            <p class="text-slate-500 mt-2">实时对接 Lalor, Box Hill, Doncaster 等区域精准需求</p>
        </div>

        <div class="grid gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-600">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">室内粉刷</span>
                    <span class="text-green-600 font-bold text-lg">$4,500</span>
                </div>
                <h4 class="text-xl font-bold text-slate-800">Doncaster 三房两卫整屋刷漆</h4>
                <p class="text-slate-600 mt-2 text-sm">需要下周一开工，包工包料。业主已经选好颜色，寻找熟练工。</p>
                
                <div class="mt-6 pt-6 border-t flex flex-col items-center">
                    <div class="text-xl font-mono font-bold tracking-widest blur-md select-none mb-4">0412 345 678</div>
                    <button onclick="alert('跳转至 Stripe 支付 $10 解锁')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-lock"></i> 支付 $10 澳币解锁联系方式
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-600">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold uppercase">地板安装</span>
                    <span class="text-green-600 font-bold text-lg">$1,200</span>
                </div>
                <h4 class="text-xl font-bold text-slate-800">Lalor 客厅复合地板铺设</h4>
                <p class="text-slate-600 mt-2 text-sm">面积约 40 平方，木料已买好，寻一名熟练工，包工不包料。</p>
                
                <div class="mt-6 pt-6 border-t flex flex-col items-center">
                    <div class="text-xl font-mono font-bold tracking-widest blur-md select-none mb-4">0488 999 000</div>
                    <button onclick="alert('跳转至 Stripe 支付 $10 解锁')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-lock"></i> 支付 $10 澳币解锁联系方式
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-10 text-center text-xs mt-20">
        <p>© 2026 MelbMarketing | 墨尔本本地流量变现专家</p>
    </footer>
</body>
</html>
